<script>
  const LB = {
    BIN_ID:       'YOUR_BIN_ID_HERE',
    API_KEY:      'YOUR_API_KEY_HERE',
    TEACHER_CODE: 'CHEM2026'
  };
</script>

<style>
  #lb-login-btn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 999;
    background: #0d1117;
    border: 1px solid #2dd4bf55;
    color: #2dd4bf;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  #lb-login-btn:hover { background: #132420; }

  #lb-panel {
    display: none;
    background: #0d1117;
    border: 1px solid #2dd4bf44;
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.2rem;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
  }
  #lb-panel::before {
    content: 'Teacher control';
    position: absolute;
    top: -10px; left: 16px;
    background: #0d1117;
    padding: 0 8px;
    font-size: 11px;
    color: #2dd4bf;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Segoe UI', sans-serif;
  }
  .lb-row   { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .lb-sub   { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
  .lb-hr    { border: none; border-top: 1px solid #2dd4bf22; margin: 12px 0; }
  .lb-input {
    font-size: 13px; padding: 5px 8px; border-radius: 6px;
    border: 1px solid #2dd4bf33; background: #111827; color: #e5e7eb;
  }
  .lb-badge-sched {
    font-size: 11px; padding: 2px 8px; border-radius: 5px;
    background: #1e3a2a; color: #34d399; border: 1px solid #34d39933; display: none;
  }
  .lb-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 6px;
  }
  .lb-status.locked   { background: #3a1212; color: #f87171; border: 1px solid #f8717144; }
  .lb-status.unlocked { background: #0d2e1f; color: #34d399; border: 1px solid #34d39944; }
  .lb-btn {
    padding: 6px 14px; border-radius: 7px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s;
  }
  .lb-btn:hover    { opacity: 0.82; }
  .lb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .lb-btn.lock-btn   { background: #f87171; color: #1a0a0a; }
  .lb-btn.unlock-btn { background: #34d399; color: #061a10; }
  .lb-btn.act-btn    { background: #2dd4bf22; color: #2dd4bf; border: 1px solid #2dd4bf55; }
  .lb-prog  { width:100%; height:6px; background:#1f2937; border-radius:3px; overflow:hidden; margin:8px 0; }
  .lb-fill  { height:100%; border-radius:3px; width:0%; background:#34d399; transition:width 1s linear, background 0.3s; }
  .lb-timer { font-size:12px; color:#9ca3af; }
  .lb-sync  { font-size:11px; color:#4b5563; text-align:right; margin-top:8px; }

  #lb-section { position: relative; border-radius: 10px; overflow: hidden; }
  #lb-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(10,14,20,0.88);
    border-radius: 10px; border: 1.5px dashed #f8717166;
    z-index: 10; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  #lb-overlay .icon {
    width:44px; height:44px; border-radius:50%;
    background:#3a1212; border:1.5px solid #f8717155;
    display:flex; align-items:center; justify-content:center;
  }
  #lb-overlay p    { margin:0; font-size:14px; font-weight:600; color:#f87171; font-family:'Segoe UI',sans-serif; }
  #lb-overlay small{ font-size:12px; color:#9ca3af; font-family:'Segoe UI',sans-serif; }
</style>

<!-- Teacher login button (always visible, bottom right) -->
<button id="lb-login-btn" onclick="lbAskLogin()">🔑 Teacher</button>

<!-- Lock bar panel (only visible after login) -->
<div id="lb-panel">
  <div class="lb-row" style="justify-content:space-between;">
    <span class="lb-status unlocked" id="lb-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
      Unlocked
    </span>
    <div style="display:flex;gap:8px;">
      <button class="lb-btn lock-btn"   id="lb-lockbtn"   onclick="lbLockNow()">🔒 Lock</button>
      <button class="lb-btn unlock-btn" id="lb-unlockbtn" onclick="lbUnlockNow()" disabled>🔓 Unlock</button>
      <button class="lb-btn act-btn"    onclick="lbLogout()" style="font-size:11px;">Logout</button>
    </div>
  </div>

  <div class="lb-prog"><div class="lb-fill" id="lb-fill"></div></div>
  <div class="lb-timer" id="lb-timer">No timer running</div>
  <hr class="lb-hr">

  <div class="lb-sub">Schedule by time</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">
    <div class="lb-row">
      <span style="font-size:12px;color:#9ca3af;min-width:68px;">Lock at</span>
      <input type="time" class="lb-input" id="lb-ltime">
      <button class="lb-btn act-btn" onclick="lbSched('lock')">Set</button>
      <span class="lb-badge-sched" id="lb-lbadge"></span>
    </div>
    <div class="lb-row">
      <span style="font-size:12px;color:#9ca3af;min-width:68px;">Unlock at</span>
      <input type="time" class="lb-input" id="lb-utime">
      <button class="lb-btn act-btn" onclick="lbSched('unlock')">Set</button>
      <span class="lb-badge-sched" id="lb-ubadge"></span>
    </div>
  </div>
  <hr class="lb-hr">

  <div class="lb-sub">Lock for a duration then auto-unlock</div>
  <div class="lb-row">
    <span style="font-size:12px;color:#9ca3af;min-width:68px;">Duration</span>
    <input type="number" class="lb-input" id="lb-dur" min="1" max="300" value="60" style="width:60px;">
    <span style="font-size:12px;color:#9ca3af;">minutes</span>
    <button class="lb-btn act-btn" onclick="lbStartCD()">▶ Start</button>
    <button class="lb-btn act-btn" onclick="lbStopCD()">■ Stop</button>
  </div>

  <div class="lb-sync" id="lb-sync">Connecting...</div>
</div>

<!-- Lockable content section -->
<div id="lb-section">

  <!-- ═══ YOUR CONTENT GOES HERE ═══ -->
  <div style="background:#0d2e1f;border:1px solid #2dd4bf33;border-radius:10px;padding:1.5rem;font-family:'Segoe UI',sans-serif;">
    <h3 style="color:#2dd4bf;margin:0 0 8px;">S4 Unit 9 – Group 14 Elements</h3>
    <p style="color:#9ca3af;font-size:14px;line-height:1.7;margin:0;">Replace this div with your real lesson content.</p>
  </div>
  <!-- ═══ END YOUR CONTENT ═══ -->

  <div id="lb-overlay">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <p>This section is locked</p>
    <small>Your teacher will unlock it when ready</small>
  </div>
</div>

<script>
(function(){
  const API = 'https://api.jsonbin.io/v3/b/' + LB.BIN_ID;
  const RH  = { 'X-Master-Key': LB.API_KEY };
  const WH  = { 'Content-Type':'application/json', 'X-Master-Key': LB.API_KEY };

  let cdInt=null, cdEnd=null, schInt=null, schLock=null, schUnlock=null;

  function pad(n){ return String(n).padStart(2,'0'); }
  function sync(t){ const el=document.getElementById('lb-sync'); if(el) el.textContent=t; }

  // ── teacher login ───────────────────────────────────────────
  window.lbAskLogin = function(){
    if(sessionStorage.getItem('lb_teacher')==='1'){ alert('You are already logged in as teacher.'); return; }
    const code = prompt('Enter teacher code:');
    if(code === LB.TEACHER_CODE){
      sessionStorage.setItem('lb_teacher','1');
      document.getElementById('lb-panel').style.display = 'block';
      document.getElementById('lb-login-btn').textContent = '✅ Teacher';
    } else if(code !== null){
      alert('Wrong code. Try again.');
    }
  };

  window.lbLogout = function(){
    sessionStorage.removeItem('lb_teacher');
    document.getElementById('lb-panel').style.display = 'none';
    document.getElementById('lb-login-btn').textContent = '🔑 Teacher';
  };

  // ── apply lock state ────────────────────────────────────────
  function applyState(locked){
    const overlay  = document.getElementById('lb-overlay');
    const badge    = document.getElementById('lb-badge');
    const lockBtn  = document.getElementById('lb-lockbtn');
    const unlockBtn= document.getElementById('lb-unlockbtn');
    overlay.style.display = locked ? 'flex' : 'none';
    if(badge){
      if(locked){
        badge.className='lb-status locked';
        badge.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Locked';
        lockBtn.disabled=true; unlockBtn.disabled=false;
      } else {
        badge.className='lb-status unlocked';
        badge.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Unlocked';
        lockBtn.disabled=false; unlockBtn.disabled=true;
      }
    }
  }

  // ── push state to JSONBin ───────────────────────────────────
  async function push(locked){
    try{
      await fetch(API,{method:'PUT',headers:WH,body:JSON.stringify({locked})});
      sync('Saved to cloud ✓ ' + new Date().toLocaleTimeString());
    } catch(e){ sync('Cloud save failed'); }
  }

  // ── fetch state from JSONBin ────────────────────────────────
  async function pull(){
    try{
      const r = await fetch(API,{headers:RH});
      const d = await r.json();
      applyState(d.record?.locked ?? false);
      sync('Synced ' + new Date().toLocaleTimeString());
    } catch(e){ sync('Sync failed'); }
  }

  // ── manual lock/unlock ──────────────────────────────────────
  window.lbLockNow = function(){ lbStopCD(); applyState(true);  push(true);  document.getElementById('lb-timer').textContent='Locked manually'; };
  window.lbUnlockNow=function(){ lbStopCD(); applyState(false); push(false); document.getElementById('lb-timer').textContent='Unlocked manually'; };

  // ── schedule ────────────────────────────────────────────────
  window.lbSched = function(type){
    const val = document.getElementById('lb-'+(type==='lock'?'l':'u')+'time').value;
    if(!val) return;
    const [h,m] = val.split(':').map(Number);
    if(type==='lock'){ schLock={h,m}; const b=document.getElementById('lb-lbadge'); b.textContent='Set '+pad(h)+':'+pad(m); b.style.display='inline'; }
    else { schUnlock={h,m}; const b=document.getElementById('lb-ubadge'); b.textContent='Set '+pad(h)+':'+pad(m); b.style.display='inline'; }
    if(!schInt) schInt=setInterval(()=>{
      const n=new Date(),h=n.getHours(),m=n.getMinutes();
      if(schLock&&schLock.h===h&&schLock.m===m){ applyState(true); push(true); document.getElementById('lb-timer').textContent='Auto-locked'; schLock=null; document.getElementById('lb-lbadge').style.display='none'; }
      if(schUnlock&&schUnlock.h===h&&schUnlock.m===m){ applyState(false); push(false); document.getElementById('lb-timer').textContent='Auto-unlocked'; schUnlock=null; document.getElementById('lb-ubadge').style.display='none'; }
    },10000);
  };

  // ── countdown ───────────────────────────────────────────────
  window.lbStartCD = function(){
    lbStopCD();
    const mins=parseInt(document.getElementById('lb-dur').value)||60;
    const total=mins*60000;
    cdEnd=Date.now()+total;
    applyState(true); push(true);
    const fill=document.getElementById('lb-fill');
    fill.style.background='#f87171';
    cdInt=setInterval(()=>{
      const rem=cdEnd-Date.now();
      if(rem<=0){ lbStopCD(); applyState(false); push(false); document.getElementById('lb-timer').textContent='Timer ended — unlocked'; fill.style.background='#34d399'; return; }
      fill.style.width=Math.round((1-rem/total)*100)+'%';
      document.getElementById('lb-timer').textContent='Locked — '+Math.floor(rem/60000)+'m '+pad(Math.floor((rem%60000)/1000))+'s remaining';
    },1000);
  };
  window.lbStopCD = function lbStopCD(){
    if(cdInt){clearInterval(cdInt);cdInt=null;}
    cdEnd=null;
    const f=document.getElementById('lb-fill');
    if(f){f.style.width='0%';f.style.background='#34d399';}
  };

  // ── init ─────────────────────────────────────────────────────
  if(sessionStorage.getItem('lb_teacher')==='1'){
    document.getElementById('lb-panel').style.display='block';
    document.getElementById('lb-login-btn').textContent='✅ Teacher';
  }
  pull();
  setInterval(pull, 8000);

})();
</script>
